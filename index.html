  <style>
    :root {
      --navy-trust: #0A1A2F;
      --deep-emerald: #1D7A6F;
      --sky-mint: #A6E6D5;
      --warm-gold: #C4A76F;
      --bg-main: #FFFFFF;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-main);
      color: var(--navy-trust);
      font-family: 'Nunito', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      text-align: center;
      max-width: 600px;
      width: 100%;
    }

    .logo {
      width: 100%;
      max-width: 300px;
      height: auto;
      margin: 0 auto 2rem;
      display: block;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--navy-trust);
      margin: 0;
      letter-spacing: -0.02em;
    }

    /* Responsive design */
    @media (max-width: 640px) {
      .logo {
        max-width: 240px;
      }
      
      h1 {
        font-size: 2rem;
      }
    }

    @media (max-width: 400px) {
      .logo {
        max-width: 200px;
      }
      
      h1 {
        font-size: 1.75rem;
      }
    }
  </style>
